<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oscar Ballot 2026 / Live Results</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Archivo+Narrow:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

  :root{
    --gold:#d4a853;
    --gold-light:#e8c97a;
    --gold-dark:#b08930;
    --black:#0a0a0a;
    --black-soft:#151515;
    --black-card:#1a1a1a;
    --cream:#f5f0e8;
    --cream-muted:#c9c1b4;
    --white:#ffffff;
    --red-carpet:#8b2020;
    --marquee-red:#6e1a1a;
    --marquee-red-bright:#a82525;
    --green:#4a7a4a;
    --green-light:#6aad6a;
    --wrong:#5a2a2a;
  }

  html{scroll-behavior:smooth}

  body{
    background:var(--black);
    color:var(--cream);
    font-family:'Cormorant Garamond',Georgia,serif;
    overflow-x:hidden;
    -webkit-font-smoothing:antialiased;
  }

  body::before{
    content:'';
    position:fixed;
    inset:0;
    z-index:9999;
    pointer-events:none;
    opacity:.035;
    background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-repeat:repeat;
    background-size:256px;
  }

  /* ============ SPLASH SCREEN ============ */
  .splash{
    position:fixed;
    inset:0;
    z-index:10000;
    background:var(--black);
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:1.5rem 1.5rem;
    transition:opacity .8s ease, visibility .8s ease;
    overflow-y:auto;
  }

  .splash.dismissed{
    opacity:0;
    visibility:hidden;
    pointer-events:none;
  }

  .splash::before{
    content:'';
    position:absolute;
    width:200vw;height:200vh;
    top:50%;left:50%;
    transform:translate(-50%,-50%);
    background:
      radial-gradient(ellipse 30% 35% at 50% 40%, rgba(212,168,83,.1) 0%, transparent 70%),
      radial-gradient(ellipse 60% 50% at 50% 80%, rgba(10,10,10,.8) 0%, transparent 70%);
    pointer-events:none;
  }

  .splash .s-stars{
    display:flex;
    gap:.5rem;
    margin-bottom:.6rem;
    opacity:0;
    animation:fadeUp .8s ease .3s forwards;
  }

  .splash .s-star{
    width:5px;height:5px;
    background:var(--gold);
    transform:rotate(45deg);
  }

  .splash .s-line{
    width:60px;height:1px;
    background:linear-gradient(90deg, transparent, var(--gold), transparent);
  }

  .splash .s-top-text{
    font-family:'Archivo Narrow',sans-serif;
    font-size:.6rem;
    letter-spacing:.5em;
    text-transform:uppercase;
    color:var(--gold);
    opacity:0;
    animation:fadeUp .6s ease .5s forwards;
    margin-bottom:.6rem;
    position:relative;
    z-index:2;
  }

  .splash .s-photo-wrap{
    position:relative;
    cursor:pointer;
    margin-bottom:.3rem;
    opacity:0;
    animation:photoReveal 1.2s ease .8s forwards;
    z-index:2;
  }

  @keyframes photoReveal{
    0%{opacity:0;transform:scale(.7)}
    60%{opacity:1;transform:scale(1.03)}
    100%{opacity:1;transform:scale(1)}
  }

  .splash .s-photo{
    width:clamp(140px, 30vw, 200px);
    height:auto;
    display:block;
    filter:drop-shadow(0 0 30px rgba(212,168,83,.15));
    transition:transform .4s ease, filter .4s ease;
    -webkit-mask-image:radial-gradient(ellipse 70% 65% at 50% 45%, black 40%, transparent 100%);
    mask-image:radial-gradient(ellipse 70% 65% at 50% 45%, black 40%, transparent 100%);
  }

  .splash .s-photo-wrap:hover .s-photo{
    transform:scale(1.05);
    filter:drop-shadow(0 0 60px rgba(212,168,83,.35));
  }

  .splash .s-photo-ring{
    position:absolute;
    inset:-15px;
    border:1px solid rgba(212,168,83,.15);
    border-radius:50%;
    opacity:0;
    animation:ringPulse 2s ease 1.5s infinite;
  }

  @keyframes ringPulse{
    0%{transform:scale(.95);opacity:.3}
    50%{transform:scale(1.05);opacity:0}
    100%{transform:scale(.95);opacity:0}
  }

  .splash .s-title{
    font-family:'Playfair Display',serif;
    font-weight:900;
    font-size:clamp(1.8rem, 5vw, 2.8rem);
    letter-spacing:.12em;
    text-transform:uppercase;
    color:var(--white);
    text-align:center;
    opacity:0;
    animation:titleSpread 1.5s ease .6s forwards;
    position:relative;
    z-index:2;
    line-height:1.1;
  }

  @keyframes titleSpread{
    0%{opacity:0;letter-spacing:.8em;color:var(--gold)}
    50%{opacity:1}
    100%{opacity:1;letter-spacing:.12em;color:var(--white)}
  }

  .splash .s-title .s-gold{color:var(--gold)}

  .splash .s-production{
    font-family:'Archivo Narrow',sans-serif;
    font-weight:600;
    font-size:clamp(.7rem, 1.5vw, .9rem);
    letter-spacing:.6em;
    text-transform:uppercase;
    color:var(--gold);
    margin-top:.4rem;
    opacity:0;
    animation:fadeUp .6s ease 1.4s forwards;
    position:relative;
    z-index:2;
  }

  .splash .s-countdown{
    display:flex;
    gap:1.2rem;
    margin-top:1.8rem;
    opacity:0;
    animation:fadeUp .6s ease 1.6s forwards;
    position:relative;
    z-index:2;
  }

  .splash .s-countdown .cd-unit{
    text-align:center;
  }

  .splash .s-countdown .cd-num{
    font-family:'Playfair Display',serif;
    font-weight:900;
    font-size:clamp(1.5rem, 3.5vw, 2.2rem);
    color:var(--white);
    line-height:1;
  }

  .splash .s-countdown .cd-label{
    font-family:'Archivo Narrow',sans-serif;
    font-size:.5rem;
    letter-spacing:.2em;
    text-transform:uppercase;
    color:var(--gold-dark);
    margin-top:.2rem;
  }

  .splash .s-countdown .cd-sep{
    font-family:'Playfair Display',serif;
    font-size:clamp(1.2rem, 3vw, 1.8rem);
    color:var(--gold);
    align-self:flex-start;
    margin-top:.1rem;
    opacity:.4;
  }

  .splash .s-countdown.show-over .cd-num{
    color:var(--gold);
  }

  .splash .s-countdown-msg{
    font-family:'Archivo Narrow',sans-serif;
    font-size:.6rem;
    letter-spacing:.3em;
    text-transform:uppercase;
    color:var(--gold);
    margin-top:1.2rem;
    opacity:0;
    animation:fadeUp .6s ease 1.8s forwards;
    position:relative;
    z-index:2;
  }

  .splash .s-enter{
    font-family:'Cormorant Garamond',serif;
    font-style:italic;
    font-size:clamp(.8rem, 1.5vw, 1rem);
    color:var(--cream-muted);
    margin-top:1.5rem;
    opacity:0;
    animation:fadeUp .6s ease 2.2s forwards, enterPulse 2s ease 2.8s infinite;
    position:relative;
    z-index:2;
  }

  @keyframes fadeUp{
    from{opacity:0;transform:translateY(20px)}
    to{opacity:1;transform:translateY(0)}
  }

  @keyframes enterPulse{
    0%,100%{opacity:.5}
    50%{opacity:1}
  }

  /* ============ HEADER ============ */
  .header{
    text-align:center;
    padding:3rem 1.5rem 2rem;
    position:relative;
  }

  .header::before{
    content:'';
    position:absolute;
    width:150vw;height:300px;
    top:-50px;left:50%;
    transform:translateX(-50%);
    background:radial-gradient(ellipse 40% 60% at 50% 30%, rgba(212,168,83,.12) 0%, transparent 70%);
    pointer-events:none;
  }

  .header-top{
    font-family:'Archivo Narrow',sans-serif;
    font-weight:600;
    font-size:.7rem;
    letter-spacing:.5em;
    text-transform:uppercase;
    color:var(--gold-light);
    margin-bottom:.5rem;
  }

  .header h1{
    font-family:'Playfair Display',serif;
    font-weight:900;
    font-size:clamp(2rem, 5vw, 3.5rem);
    line-height:.95;
    color:var(--white);
    margin-bottom:.3rem;
  }

  .header h1 .gold{color:var(--gold)}

  .header-sub{
    font-family:'Playfair Display',serif;
    font-style:italic;
    font-size:clamp(.9rem, 1.8vw, 1.2rem);
    color:var(--cream-muted);
    margin-bottom:1.5rem;
  }

  .header-instructions{
    font-family:'Archivo Narrow',sans-serif;
    font-size:.65rem;
    letter-spacing:.2em;
    text-transform:uppercase;
    color:var(--cream-muted);
    opacity:.6;
    max-width:500px;
    margin:0 auto;
    line-height:1.8;
  }

  .back-link{
    display:inline-block;
    font-family:'Archivo Narrow',sans-serif;
    font-size:.65rem;
    letter-spacing:.2em;
    text-transform:uppercase;
    color:var(--gold);
    text-decoration:none;
    margin-bottom:1rem;
    transition:color .2s;
  }

  .back-link:hover{color:var(--gold-light)}

  /* ============ DIVIDER ============ */
  .deco-divider{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:1rem;
    padding:1rem 0;
  }

  .deco-divider .line{
    width:60px;height:1px;
    background:linear-gradient(90deg,transparent,var(--gold),transparent);
  }

  .deco-divider .diamond{
    width:8px;height:8px;
    background:var(--gold);
    transform:rotate(45deg);
    flex-shrink:0;
  }

  /* ============ LEADERBOARD ============ */
  .leaderboard-section{
    max-width:900px;
    margin:0 auto;
    padding:1rem 1.5rem 3rem;
  }

  .section-label{
    font-family:'Archivo Narrow',sans-serif;
    font-weight:600;
    font-size:.75rem;
    letter-spacing:.4em;
    text-transform:uppercase;
    color:var(--gold);
    margin-bottom:1rem;
    text-align:center;
  }

  /* --- Podium (top 3) --- */
  .podium{
    display:flex;
    align-items:flex-end;
    justify-content:center;
    gap:1rem;
    margin-bottom:2.5rem;
    padding:0 1rem;
  }

  .podium-spot{
    display:flex;
    flex-direction:column;
    align-items:center;
    text-align:center;
    flex:1;
    max-width:200px;
  }

  .podium-spot .p-rank{
    font-family:'Playfair Display',serif;
    font-weight:900;
    line-height:1;
    margin-bottom:.4rem;
  }

  .podium-spot .p-name{
    font-family:'Cormorant Garamond',serif;
    color:var(--white);
    margin-bottom:.3rem;
  }

  .podium-spot .p-score{
    font-family:'Archivo Narrow',sans-serif;
    font-weight:700;
    letter-spacing:.1em;
    margin-bottom:.6rem;
  }

  .podium-spot .p-pedestal{
    width:100%;
    background:var(--black-card);
    border:1px solid rgba(212,168,83,.1);
    border-bottom:none;
    position:relative;
  }

  .podium-spot .p-pedestal::after{
    content:'';
    position:absolute;
    bottom:0;left:0;right:0;
    height:3px;
  }

  /* 1st place */
  .podium-spot.gold-place .p-rank{
    font-size:2.5rem;
    color:var(--gold);
  }
  .podium-spot.gold-place .p-name{font-size:1.3rem}
  .podium-spot.gold-place .p-score{font-size:1.1rem;color:var(--gold)}
  .podium-spot.gold-place .p-pedestal{
    height:100px;
    border-color:rgba(212,168,83,.3);
    background:linear-gradient(180deg, #1f1a0e 0%, var(--black-card) 100%);
  }
  .podium-spot.gold-place .p-pedestal::after{
    background:linear-gradient(90deg, var(--gold-dark), var(--gold-light), var(--gold-dark));
  }

  /* 2nd place */
  .podium-spot.silver-place .p-rank{
    font-size:2rem;
    color:var(--cream-muted);
  }
  .podium-spot.silver-place .p-name{font-size:1.1rem}
  .podium-spot.silver-place .p-score{font-size:.9rem;color:var(--cream-muted)}
  .podium-spot.silver-place .p-pedestal{
    height:70px;
  }
  .podium-spot.silver-place .p-pedestal::after{
    background:linear-gradient(90deg, transparent, var(--cream-muted), transparent);
    opacity:.4;
  }

  /* 3rd place */
  .podium-spot.bronze-place .p-rank{
    font-size:1.6rem;
    color:#a0785a;
  }
  .podium-spot.bronze-place .p-name{font-size:1rem}
  .podium-spot.bronze-place .p-score{font-size:.85rem;color:#a0785a}
  .podium-spot.bronze-place .p-pedestal{
    height:50px;
  }
  .podium-spot.bronze-place .p-pedestal::after{
    background:linear-gradient(90deg, transparent, #a0785a, transparent);
    opacity:.4;
  }

  @media(max-width:500px){
    .podium{gap:.5rem}
    .podium-spot.gold-place .p-rank{font-size:2rem}
    .podium-spot.silver-place .p-rank{font-size:1.6rem}
    .podium-spot.bronze-place .p-rank{font-size:1.3rem}
    .podium-spot.gold-place .p-pedestal{height:70px}
    .podium-spot.silver-place .p-pedestal{height:50px}
    .podium-spot.bronze-place .p-pedestal{height:35px}
  }

  /* --- Rest of pack (grid) --- */
  .pack-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(120px, 1fr));
    gap:.6rem;
  }

  .pack-card{
    background:var(--black-card);
    border:1px solid rgba(212,168,83,.06);
    padding:.8rem .6rem;
    text-align:center;
    position:relative;
    transition:border-color .3s;
  }

  .pack-card:hover{
    border-color:rgba(212,168,83,.15);
  }

  .pack-card .pc-rank{
    font-family:'Archivo Narrow',sans-serif;
    font-size:.55rem;
    letter-spacing:.15em;
    text-transform:uppercase;
    color:rgba(201,193,180,.35);
    margin-bottom:.3rem;
  }

  .pack-card .pc-name{
    font-family:'Cormorant Garamond',serif;
    font-size:1rem;
    color:var(--white);
    margin-bottom:.2rem;
    line-height:1.2;
  }

  .pack-card .pc-score{
    font-family:'Archivo Narrow',sans-serif;
    font-weight:700;
    font-size:.85rem;
    color:var(--gold);
    letter-spacing:.05em;
  }

  .pack-card .pc-bar{
    position:absolute;
    bottom:0;left:0;right:0;
    height:2px;
    background:rgba(212,168,83,.06);
  }

  .pack-card .pc-bar-fill{
    height:100%;
    background:var(--gold-dark);
    transition:width .6s ease;
  }

  /* ============ CATEGORIES ============ */
  .categories-section{
    max-width:1100px;
    margin:0 auto;
    padding:2rem 1.5rem 5rem;
  }

  .category-block{
    margin-bottom:2.5rem;
    background:var(--black-card);
    border:1px solid rgba(212,168,83,.08);
    overflow:hidden;
  }

  .category-block.has-winner{
    border-color:rgba(212,168,83,.2);
  }

  .cat-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:1rem 1.2rem;
    background:linear-gradient(180deg, #1e1e1e 0%, var(--black-card) 100%);
    border-bottom:1px solid rgba(212,168,83,.08);
    cursor:pointer;
    user-select:none;
  }

  .cat-header:hover{
    background:linear-gradient(180deg, #252525 0%, #1e1e1e 100%);
  }

  .cat-title{
    font-family:'Archivo Narrow',sans-serif;
    font-weight:700;
    font-size:.75rem;
    letter-spacing:.3em;
    text-transform:uppercase;
    color:var(--gold);
  }

  .cat-winner-badge{
    font-family:'Archivo Narrow',sans-serif;
    font-size:.6rem;
    letter-spacing:.15em;
    text-transform:uppercase;
    background:rgba(74,122,74,.2);
    color:var(--green-light);
    padding:.2rem .6rem;
    display:none;
  }

  .category-block.has-winner .cat-winner-badge{
    display:inline-block;
  }

  .cat-body{
    overflow:hidden;
    transition:max-height .4s ease;
  }

  .cat-body.collapsed{
    max-height:0 !important;
  }

  /* Scrollable table wrapper for mobile */
  .cat-scroll{
    overflow-x:auto;
    -webkit-overflow-scrolling:touch;
    scrollbar-width:thin;
    scrollbar-color:var(--gold-dark) transparent;
  }

  .cat-scroll::-webkit-scrollbar{
    height:4px;
  }

  .cat-scroll::-webkit-scrollbar-track{
    background:transparent;
  }

  .cat-scroll::-webkit-scrollbar-thumb{
    background:var(--gold-dark);
    border-radius:2px;
  }

  .cat-table{
    min-width:100%;
    width:max-content;
  }

  /* Nominee row */
  .nominee-row{
    display:grid;
    grid-template-columns:minmax(140px, 1.5fr) repeat(var(--player-count), minmax(42px, 1fr));
    border-bottom:1px solid rgba(255,255,255,.03);
    transition:background .2s;
  }

  .nominee-row:last-child{border:none}

  .nominee-row:hover{
    background:rgba(212,168,83,.02);
  }

  .nominee-row.is-winner{
    background:rgba(74,122,74,.08);
  }

  .nominee-row.is-winner .nom-name{
    color:var(--gold-light);
    font-weight:600;
  }

  .nominee-row.is-winner .nom-name::before{
    content:'';
    display:inline-block;
    width:6px;height:6px;
    background:var(--gold);
    border-radius:50%;
    margin-right:.4rem;
    flex-shrink:0;
    vertical-align:middle;
    box-shadow:0 0 6px rgba(212,168,83,.5);
  }

  .nom-name{
    font-family:'Cormorant Garamond',serif;
    font-size:.85rem;
    color:var(--cream);
    padding:.5rem .6rem;
    display:flex;
    align-items:center;
    white-space:nowrap;
    position:sticky;
    left:0;
    background:var(--black-card);
    z-index:2;
  }

  .nominee-row.is-winner .nom-name{
    background:rgba(30,40,30,.95);
  }

  .nom-cell{
    text-align:center;
    padding:.5rem .2rem;
    font-family:'Archivo Narrow',sans-serif;
    font-size:.7rem;
    letter-spacing:.05em;
    text-transform:uppercase;
    display:flex;
    align-items:center;
    justify-content:center;
  }

  .nom-cell .pick-dot{
    width:7px;height:7px;
    border-radius:50%;
    background:rgba(201,193,180,.15);
  }

  .nom-cell .pick-dot.picked{
    background:var(--cream-muted);
  }

  .nom-cell .pick-dot.correct{
    background:var(--green-light);
    box-shadow:0 0 6px rgba(106,173,106,.5);
  }

  .nom-cell .pick-dot.wrong{
    background:var(--wrong);
  }

  /* Player header row */
  .player-header{
    display:grid;
    grid-template-columns:minmax(140px, 1.5fr) repeat(var(--player-count), minmax(42px, 1fr));
    background:#111;
    border-bottom:1px solid rgba(212,168,83,.1);
    position:sticky;
    top:0;
    z-index:10;
  }

  .player-header .ph-label{
    font-family:'Archivo Narrow',sans-serif;
    font-size:.5rem;
    letter-spacing:.1em;
    text-transform:uppercase;
    color:var(--cream-muted);
    padding:.5rem .6rem;
    position:sticky;
    left:0;
    background:#111;
    z-index:3;
  }

  .player-header .ph-name{
    font-family:'Archivo Narrow',sans-serif;
    font-size:.45rem;
    letter-spacing:.02em;
    text-transform:uppercase;
    color:var(--gold);
    text-align:center;
    padding:.5rem .1rem;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }

  /* Scroll hint on mobile */
  .scroll-hint{
    display:none;
    font-family:'Archivo Narrow',sans-serif;
    font-size:.5rem;
    letter-spacing:.15em;
    text-transform:uppercase;
    color:var(--cream-muted);
    text-align:right;
    padding:.4rem .8rem .2rem;
    align-items:center;
    justify-content:flex-end;
    gap:.4rem;
  }

  .scroll-hint .sh-arrow{
    display:inline-block;
    animation:swipeHint 1.5s ease infinite;
  }

  @keyframes swipeHint{
    0%,100%{transform:translateX(0);opacity:.4}
    50%{transform:translateX(6px);opacity:.8}
  }

  /* Scroll fade overlay on right edge */
  .cat-scroll-wrap{
    position:relative;
  }

  .cat-scroll-wrap::after{
    content:'';
    position:absolute;
    top:0;right:0;bottom:0;
    width:30px;
    background:linear-gradient(90deg, transparent, var(--black-card));
    pointer-events:none;
    z-index:4;
    display:none;
  }

  /* ============ CONAN ============ */
  .conan{
    position:fixed;
    top:1rem;
    right:1rem;
    z-index:100;
    cursor:pointer;
    transition:transform .3s ease;
    text-align:center;
  }

// ============ SCORING ============
function calcScores() {
  const scores = players.map(() => 0);
  categories.forEach(cat => {
    const winner = winners[cat.name];
    if (!winner) return;
    cat.picks.forEach((pick, pi) => {
      if (pick === winner) scores[pi]++;
    });
  });
  return scores;
}

// ============ RENDER LEADERBOARD ============
function renderLeaderboard() {
  const scores = calcScores();
  const totalDecided = Object.keys(winners).length;

  const ranked = players.map((p, i) => ({ ...p, score: scores[i], idx: i }))
    .sort((a, b) => b.score - a.score);

  const podium = document.getElementById('podium');
  const pack = document.getElementById('pack');
  podium.innerHTML = '';
  pack.innerHTML = '';

  const hasScores = totalDecided > 0;

  if (hasScores) {
    // Show podium for top 3
    podium.style.display = '';
    const placeClass = ['gold-place', 'silver-place', 'bronze-place'];
    const podiumOrder = [1, 0, 2];

    podiumOrder.forEach(i => {
      const p = ranked[i];
      if (!p) return;
      const spot = document.createElement('div');
      spot.className = 'podium-spot ' + placeClass[i];
      spot.innerHTML = `
        <div class="p-rank">${i + 1}</div>
        <div class="p-name">${p.short}</div>
        <div class="p-score">${p.score} / ${totalDecided}</div>
        <div class="p-pedestal"></div>
      `;
      podium.appendChild(spot);
    });

    // Rest of the pack
    for (let i = 3; i < ranked.length; i++) {
      const p = ranked[i];
      const pct = totalDecided > 0 ? (p.score / totalDecided * 100) : 0;
      const card = document.createElement('div');
      card.className = 'pack-card';
      card.innerHTML = `
        <div class="pc-rank">#${i + 1}</div>
        <div class="pc-name">${p.short}</div>
        <div class="pc-score">${p.score} / ${totalDecided}</div>
        <div class="pc-bar"><div class="pc-bar-fill" style="width:${pct}%"></div></div>
      `;
      pack.appendChild(card);
    }
  } else {
    // No winners yet: equal grid for everyone
    podium.style.display = 'none';
    ranked.forEach(p => {
      const card = document.createElement('div');
      card.className = 'pack-card';
      card.innerHTML = `
        <div class="pc-name">${p.short}</div>
        <div class="pc-score">0 / 0</div>
      `;
      pack.appendChild(card);
    });
  }
}

// ============ RENDER CATEGORIES ============
function renderCategories() {
  const container = document.getElementById('categories');
  container.innerHTML = '';

  const playerCount = players.length;

  categories.forEach(cat => {
    const winner = winners[cat.name] || null;
    const block = document.createElement('div');
    block.className = 'category-block' + (winner ? ' has-winner' : '');
    block.style.setProperty('--player-count', playerCount);

    // Header
    const header = document.createElement('div');
    header.className = 'cat-header';
    header.innerHTML = `
      <span class="cat-title">${cat.name}</span>
      <span class="cat-winner-badge">${winner ? '&#10003; ' + winner : ''}</span>
    `;

    // Body
    const body = document.createElement('div');
    body.className = 'cat-body';

    // Scroll hint for mobile
    const hint = document.createElement('div');
    hint.className = 'scroll-hint';
    hint.innerHTML = 'Swipe to see all picks <span class="sh-arrow">\u2192</span>';
    body.appendChild(hint);

    // Scrollable wrapper
    const scroll = document.createElement('div');
    scroll.className = 'cat-scroll';

    const table = document.createElement('div');
    table.className = 'cat-table';

    // Player header row
    const ph = document.createElement('div');
    ph.className = 'player-header';
    ph.style.setProperty('--player-count', playerCount);
    ph.innerHTML = `<div class="ph-label">Nominee</div>` +
      players.map(p => `<div class="ph-name">${p.short}</div>`).join('');
    table.appendChild(ph);

    // Nominee rows
    cat.nominees.forEach(nom => {
      const row = document.createElement('div');
      row.className = 'nominee-row' + (nom === winner ? ' is-winner' : '');
      row.style.setProperty('--player-count', playerCount);

      const nameCell = document.createElement('div');
      nameCell.className = 'nom-name';
      nameCell.textContent = nom;
      row.appendChild(nameCell);

      // Player pick dots
      cat.picks.forEach(pick => {
        const cell = document.createElement('div');
        cell.className = 'nom-cell';
        const dot = document.createElement('div');
        let dotClass = 'pick-dot';
        if (pick === nom) {
          dotClass += ' picked';
          if (winner) {
            dotClass += nom === winner ? ' correct' : ' wrong';
          }
        }
        dot.className = dotClass;
        cell.appendChild(dot);
        row.appendChild(cell);
      });

      table.appendChild(row);
    });

    scroll.appendChild(table);

    const scrollWrap = document.createElement('div');
    scrollWrap.className = 'cat-scroll-wrap';
    scrollWrap.appendChild(scroll);
    body.appendChild(scrollWrap);

    // Toggle collapse
    header.addEventListener('click', () => {
      body.classList.toggle('collapsed');
    });

    block.appendChild(header);
    block.appendChild(body);
    container.appendChild(block);
  });
}

// ============ SPLASH ============
document.getElementById('splash-enter').addEventListener('click', () => {
  document.getElementById('splash').classList.add('dismissed');
});

setTimeout(() => {
  document.getElementById('splash').addEventListener('click', () => {

// ============ COUNTDOWN ============
// Oscars start at 7:00 PM ET on March 15, 2026
const oscarsStart = new Date('2026-03-15T19:00:00-04:00').getTime();

function updateCountdown() {
  const now = Date.now();
  const diff = oscarsStart - now;
  const cdMsg = document.getElementById('cd-msg');
  const cdEl = document.getElementById('countdown');

  if (diff <= 0) {
    document.getElementById('cd-hrs').textContent = '0';
    document.getElementById('cd-min').textContent = '0';
    document.getElementById('cd-sec').textContent = '0';
    cdMsg.textContent = "It's showtime";
    cdEl.classList.add('show-over');
    return;
  }

  const hrs = Math.floor(diff / 3600000);
  const min = Math.floor((diff % 3600000) / 60000);
  const sec = Math.floor((diff % 60000) / 1000);

  document.getElementById('cd-hrs').textContent = hrs;
  document.getElementById('cd-min').textContent = String(min).padStart(2, '0');
  document.getElementById('cd-sec').textContent = String(sec).padStart(2, '0');
}

updateCountdown();
setInterval(updateCountdown, 1000);

// ============ INIT ============
renderLeaderboard();
renderCategories();

// ============ CONAN CLAP ============
let prevWinnerCount = 0;

function conanClap() {
  const conan = document.getElementById('conan');
  conan.classList.remove('clapping');
  // Remove old confetti
  conan.querySelectorAll('.confetti').forEach(c => c.remove());
  // Trigger reflow
  void conan.offsetWidth;
  conan.classList.add('clapping');

  // Spawn confetti
  const colors = ['#d4a853', '#e8c97a', '#fff', '#f5f0e8', '#b08930'];
  for (let i = 0; i < 12; i++) {
    const c = document.createElement('div');
    c.className = 'confetti';
    c.style.background = colors[i % colors.length];
    c.style.left = '50%';
    c.style.top = '50%';
    const angle = (i / 12) * Math.PI * 2;
    const dist = 30 + Math.random() * 30;
    const dx = Math.cos(angle) * dist;
    const dy = Math.sin(angle) * dist;
    c.style.transition = `all ${0.6 + Math.random() * 0.4}s ease-out`;
    conan.appendChild(c);
    requestAnimationFrame(() => {
      c.style.opacity = '1';
      c.style.transform = `translate(${dx}px, ${dy}px)`;
      setTimeout(() => { c.style.opacity = '0'; }, 600);
      setTimeout(() => c.remove(), 1200);
    });
  }

  setTimeout(() => conan.classList.remove('clapping'), 2000);
}

// ============ AUTO-POLL ============
// Fetch winners from cloud every 5 seconds
async function pollWinners() {
  try {
    const res = await fetch(API_URL);
    const data = await res.json();
    const fresh = data.winners || {};
    if (JSON.stringify(fresh) !== JSON.stringify(winners)) {
      const newCount = Object.keys(fresh).length;
      const oldCount = Object.keys(winners).length;
      winners = fresh;
      renderLeaderboard();
      renderCategories();
      // Conan claps when a new winner is added
      if (newCount > oldCount) {
        conanClap();
      }
    }
  } catch {}
}

prevWinnerCount = Object.keys(winners).length;
pollWinners();
setInterval(pollWinners, 5000);
